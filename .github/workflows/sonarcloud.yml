name: SonarCloud

on:
  push:
    branches: [main, dev]
    paths:
      - 'modules/ciph-go/**'
      - '.github/workflows/sonarcloud.yml'
      - 'sonar-project.properties'
  pull_request:
    branches: [main, dev]
    paths:
      - 'modules/ciph-go/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run Go tests with coverage
        run: |
          cd modules/ciph-go/core
          go test -v -coverprofile=coverage.out ./...
          cd ../middleware
          go test -v -coverprofile=coverage.out ./...
          cd ..
          # Merge coverage files for SonarQube
          echo "mode: set" > coverage.out
          tail -n +2 core/coverage.out >> coverage.out
          tail -n +2 middleware/coverage.out >> coverage.out

      - name: Fix coverage file paths
        run: |
          cd modules/ciph-go
          sed -i 's|^github.com/Eularix/ciph/modules/ciph-go/||g' coverage.out

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=eularix_ciph
            -Dsonar.organization=eularix
            -Dsonar.sources=modules/ciph-go
            -Dsonar.go.coverage.reportPaths=modules/ciph-go/coverage.out
            -Dsonar.exclusions=**/vendor/**,**/**/example/**,**/docs/**
            -Dsonar.coverage.exclusions=**/vendor/**,**/**/example/**,**/docs/**
            -Dsonar.pullRequest.provider=github
