name: Release

on:
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: write
  pull-requests: write

jobs:
  # Create or update version PR
  version:
    name: Create Version PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Create Version PR
        uses: changesets/action@v1
        with:
          version: bun changeset version
          commit: 'chore: bump package versions'
          title: 'chore: bump package versions'
          createGithubReleases: aggregate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Detect if we're on a version bump commit and publish
  publish:
    name: Publish Packages
    if: always()
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Setup npm authentication for bun publish

        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          chmod 600 ~/.npmrc

      - name: Publish packages
        uses: changesets/action@v1
        with:
          publish: bun changeset publish
          createGithubReleases: aggregate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate release notes
        if: always()
        run: |
          echo "## 📦 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Packages" >> $GITHUB_STEP_SUMMARY
          ls -la packages/ | grep "^d" | awk '{print "- " $NF}' >> $GITHUB_STEP_SUMMARY || echo "No packages found" >> $GITHUB_STEP_SUMMARY

