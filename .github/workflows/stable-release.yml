name: Stable Release

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'bun.lock'
      - '.github/workflows/stable-release.yml'

permissions:
  contents: write
  pull-requests: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  detect-and-promote:
    name: Detect Changes & Promote to Stable
    runs-on: ubuntu-latest
    outputs:
      changed-dirs: ${{ steps.detect.outputs.directories }}
      changed-packages: ${{ steps.detect.outputs.packages }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detect changed packages since last stable release
        id: detect
        run: |
          # Get all package.json files in packages/
          DIRS=""
          PKGS=""
          
          for pkg_dir in packages/*/; do
            DIR_NAME=$(basename "$pkg_dir")
            if [ -f "$pkg_dir/package.json" ]; then
              PKG_NAME=$(jq -r '.name' "$pkg_dir/package.json")
              IS_PRIVATE=$(jq -r '.private // false' "$pkg_dir/package.json")
              
              # Skip private packages
              if [ "$IS_PRIVATE" != "true" ]; then
                DIRS="${DIRS}${DIR_NAME},"
                PKGS="${PKGS}${PKG_NAME},"
              fi
            fi
          done
          
          # Remove trailing commas
          DIRS="${DIRS%,}"
          PKGS="${PKGS%,}"
          HAS_CHANGES=$([ -z "$DIRS" ] && echo "false" || echo "true")

          echo "directories=$DIRS" >> "$GITHUB_OUTPUT"
          echo "packages=$PKGS" >> "$GITHUB_OUTPUT"
          echo "has-changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"

          echo "Changed dirs: $DIRS"
          echo "Changed packages: $PKGS"
          echo "Has changes: $HAS_CHANGES"

      - name: Promote beta to stable versions
        if: steps.detect.outputs.has-changes == 'true'
        env:
          CHANGED_DIRS: ${{ steps.detect.outputs.directories }}
        run: |
          DIRS_ARRAY=$(echo "$CHANGED_DIRS" | tr ',' '\n' | jq -Rs 'split("\n") | map(select(length > 0))')
          node scripts/bump-stable-versions.js "$DIRS_ARRAY"

      - name: Commit version promotions
        if: steps.detect.outputs.has-changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: promote beta versions to stable for main release" || echo "No changes to commit"

      - name: Generate changelogs
        if: steps.detect.outputs.has-changes == 'true'
        env:
          CHANGED_DIRS: ${{ steps.detect.outputs.directories }}
        run: |
          IFS=',' read -ra DIRS <<< "$CHANGED_DIRS"
          for DIR in "${DIRS[@]}"; do
            CHANGELOG="packages/$DIR/CHANGELOG.md"
            VERSION=$(grep '"version"' "packages/$DIR/package.json" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            DATE=$(date -u +"%Y-%m-%d")

            if [ ! -f "$CHANGELOG" ]; then
              printf "# Changelog\n\nAll notable changes to @ciph/%s will be documented in this file.\n\n## [%s] - %s\n\n### Added\n- Initial release\n" "$DIR" "$VERSION" "$DATE" > "$CHANGELOG"
            fi

            git add "$CHANGELOG" || true
          done

          git commit -m "chore: update changelogs for stable release" || echo "No changelog changes"

      - name: Push commits
        if: steps.detect.outputs.has-changes == 'true'
        run: |
          git push origin main || echo "No commits to push"

  publish-stable:
    name: Publish Stable to npm
    runs-on: ubuntu-latest
    needs: detect-and-promote
    if: needs.detect-and-promote.outputs.has-changes == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Publish stable packages
        env:
          CHANGED_PACKAGES: ${{ needs.detect-and-promote.outputs.changed-packages }}
        run: |
          # Create .npmrc with auth token for bun publish
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          chmod 600 ~/.npmrc
          
          IFS=',' read -ra PKGS <<< "$CHANGED_PACKAGES"
          FAILED_PKGS=()
          for PKG in "${PKGS[@]}"; do
            for pkg_dir in packages/*/; do
              if grep -q "\"name\": \"$PKG\"" "$pkg_dir/package.json" 2>/dev/null; then
                echo "đź“¦ Publishing $PKG..."
                if (cd "$pkg_dir" && bun publish --tag latest); then
                  echo "âś… $PKG published successfully"
                else
                  echo "âťŚ $PKG failed to publish, continuing with others..."
                  FAILED_PKGS+=("$PKG")
                fi
              fi
            done
          done
          
          # Report result
          if [ ${#FAILED_PKGS[@]} -gt 0 ]; then
            echo "âš ď¸Ź  Some packages failed: ${FAILED_PKGS[*]}"
            exit 1
          else
            echo "âś… All packages published!"
          fi

      - name: Create git release tags
        env:
          CHANGED_DIRS: ${{ needs.detect-and-promote.outputs.changed-dirs }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          IFS=',' read -ra DIRS <<< "$CHANGED_DIRS"
          for DIR in "${DIRS[@]}"; do
            if [ -f "packages/$DIR/package.json" ]; then
              VERSION=$(grep '"version"' "packages/$DIR/package.json" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
              PKG_NAME=$(grep '"name"' "packages/$DIR/package.json" | grep -oE '@ciph/[^"]+' | head -1)
              if [ ! -z "$VERSION" ] && [ ! -z "$PKG_NAME" ]; then
                TAG="${PKG_NAME##*/}-v${VERSION}"
                git tag "$TAG"
                echo "Created tag: $TAG"
              fi
            fi
          done
          git push origin --tags || echo "No tags to push"

      - name: Create GitHub releases
        uses: actions/github-script@v7
        env:
          CHANGED_DIRS: ${{ needs.detect-and-promote.outputs.changed-dirs }}
        with:
          script: |
            const fs = require('fs');
            const changedDirs = process.env.CHANGED_DIRS.split(',').filter(d => d.trim());

            for (const dir of changedDirs) {
              const pkgJsonPath = `packages/${dir}/package.json`;
              const pkg = JSON.parse(fs.readFileSync(pkgJsonPath, 'utf-8'));
              const changelogPath = `packages/${dir}/CHANGELOG.md`;
              const changelog = fs.existsSync(changelogPath)
                ? fs.readFileSync(changelogPath, 'utf-8').split('\n').slice(0, 20).join('\n')
                : 'See CHANGELOG.md for details';

              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: `${dir}-v${pkg.version}`,
                name: `${pkg.name} v${pkg.version}`,
                body: changelog,
                draft: false,
                prerelease: false,
              }).catch(() => console.log(`Release already exists for ${dir}-v${pkg.version}`));
            }

      - name: Create release summary
        env:
          CHANGED_DIRS: ${{ needs.detect-and-promote.outputs.changed-dirs }}
        run: |
          echo "## đź“¦ Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Packages" >> $GITHUB_STEP_SUMMARY
          IFS=',' read -ra DIRS <<< "$CHANGED_DIRS"
          for DIR in "${DIRS[@]}"; do
            if [ -f "packages/$DIR/package.json" ]; then
              VERSION=$(grep '"version"' "packages/$DIR/package.json" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
              PKG_NAME=$(grep '"name"' "packages/$DIR/package.json" | grep -oE '@ciph/[^"]+' | head -1)
              echo "- \`$PKG_NAME@$VERSION\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
